<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>処理中...</title>

  <style>
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --accent: #3b82f6;
    }

    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #1e293b, var(--bg));
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .text {
      font-size: 14px;
      opacity: 0.8;
    }

    .sub {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="text">処理しています…</div>
    <div class="sub">自動的に次のページへ移動します</div>
  </div>

  <script>
    (async () => {
      try {
        // ===== ここに処理を書く =====
        await fakeProcess();

        // リダイレクト
        location.replace("/next-page");

      } catch (e) {
      }
    })();

    function fakeProcess() {
      // サンプル用（実際はAPIなど）
      return new Promise(resolve => setTimeout(resolve, 2000));
    }

    function showError(e) {
      document.querySelector(".text").textContent = "エラーが発生しました: " + e;
      document.querySelector(".sub").textContent = "再読み込みしてください";
    }
  </script>
</body>
</html>
